services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:///data/ect.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build: .
    command: streamlit run ect_frontend/app.py --server.port 8501 --server.headless true
    ports:
      - "8501:8501"
    environment:
      - ECT_API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
